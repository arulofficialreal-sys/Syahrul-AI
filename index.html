<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYAHRUL AI - MASTER INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --neon-blue: #00d2ff;
            --dark-blue: #003366;
            --glow: 0 0 15px rgba(0, 210, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background-color: var(--bg-black);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background Grid Futuristik */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        /* Teks Utama di Tengah dengan Glow */
        .container {
            text-align: center;
            z-index: 1;
        }

        .main-prompt {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: var(--glow);
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        /* Animasi Typing */
        .typing {
            display: inline-block;
            overflow: hidden;
            border-right: 3px solid var(--neon-blue);
            white-space: nowrap;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--neon-blue); } }

        /* Search Bar di Bawah */
        .input-wrapper {
            position: absolute;
            bottom: 50px;
            width: 90%;
            max-width: 700px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--dark-blue);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 10px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(0, 210, 255, 0.1);
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--neon-blue);
            box-shadow: var(--glow);
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-family: 'Exo', sans-serif;
            font-size: 1.1rem;
            padding: 10px;
            outline: none;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 1.3rem;
            cursor: pointer;
            margin: 0 10px;
            transition: 0.3s;
        }

        .icon-btn:hover { color: var(--neon-blue); text-shadow: var(--glow); }

        .send-btn {
            background: var(--neon-blue);
            color: black;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: var(--glow);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div class="main-prompt" id="mainText">
            <span class="typing">Dari mana kita mulai?</span>
        </div>
    </div>

    <div class="input-wrapper">
        <button class="icon-btn">+</button>
        <input type="text" id="userInput" placeholder="Tanyakan apa saja pada Syahrul AI..." autocomplete="off">
        <button class="icon-btn">🎤</button>
        <button class="icon-btn send-btn" onclick="executeCommand()">⬆</button>
    </div>

    <script>
        function executeCommand() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('mainText');
            
            if (input.value.trim() !== "") {
                // Efek Transisi saat perintah dikirim
                display.style.opacity = "0";
                setTimeout(() => {
                    display.innerHTML = `<span style="font-size: 1.5rem; color: #00d2ff;">EXECUTING:</span><br>${input.value.toUpperCase()}`;
                    display.style.opacity = "1";
                    input.value = "";
                }, 500);
            }
        }

        // Support Enter Key
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') executeCommand();
        });
    </script>
</body>
</html>
